# listings.yaml — every external listing/submission of Nika registers HERE.
# Law (AGENTS.md): descriptions are never improvised in a submission form —
# they are pinned from integrations/description-bank.md. Each entry carries
# its cadence class and the kill criterion. SPDX-License-Identifier: Apache-2.0

listings_version: 1

policy:
  description_source: integrations/description-bank.md
  cadence_classes:
    auto-indexed: quarterly verify (URL 200 · listing text matches the bank)
    submitted-pr: weekly watch until merged/closed · then becomes directory-entry
    directory-entry: monthly verify (URL 200 · description matches the bank)
    per-release-watch: re-verify at every engine release (fast-moving host)
  kill_criterion: >
    60 days without maintainer signal on a submitted PR → close it ourselves
    with a courteous note, record the outcome here, and stay on the day-1
    paths (tap/URL/npx) — no listing is load-bearing.
  ritual: >
    Monthly (scriptable later): for each entry, check url is live and the
    shown description still matches the pinned block. Quarterly: prune dead
    surfaces. Every submission and close is announced (L8).

entries:
  - surface: skills.sh
    class: auto-indexed
    status: pending-index  # was `live` — page 404s + badge renders "resource
      # not found" (verified 2026-07-09 late); the npx install path works
      # regardless (pulls GitHub directly). Badge commented in README until
      # the page resolves 200 — the registry obeys its own URL-200 ritual.
    url: https://skills.sh/supernovae-st/nika-agents
    installed_via: npx skills add supernovae-st/nika-agents
    description_block: skills-registries lead (description-bank §per-surface)
    submitted: null
    notes: install path taught in docs integrations/hermes · re-check at the
      monthly ritual · operator may need to claim the repo on skills.sh

  - surface: hermes official catalog (NousResearch/hermes-agent)
    class: submitted-pr
    status: pending
    url: https://github.com/NousResearch/hermes-agent/pull/61632
    submitted: 2026-07-09
    description_block: hermes/agent catalogs lead (description-bank §per-surface)
    payload: optional-skills/autonomous-ai-agents/nika/SKILL.md (byte-identical
      mirror of skills/autonomous-ai-agents/nika/SKILL.md v1.0.2 · git blob
      c774ffe238976335995ee99c0c293896a567d186)
    kill_check: 2026-09-07
    notes: upside-not-gate (day-1 = tap/URL already live) · measured external
      merge latency ≥14d · fallback category software-development offered

  - surface: punkpeye/awesome-mcp-servers
    class: submitted-pr
    status: pending
    url: https://github.com/punkpeye/awesome-mcp-servers/pull/9743
    submitted: 2026-07-09
    description_block: one-line + read-only-oracle clause (description-bank §per-surface)
    payload: README Developer Tools · one line · legend 🎖️🦀🏠🍎🐧
    kill_check: 2026-09-07
    notes: agent fast-track opted in (🤖🤖🤖 title convention per their
      CONTRIBUTING) · GATED missing-glama by their bot (all 60 PRs merged
      since 06-25 carry has-glama) — unblocks via the Glama listing below,
      then add the score badge to the PR line

queued_operator:
  - surface: glama.ai (glama.ai/mcp/servers · 53k servers)
    blocker: web « Add Server » flow (account) + paste the Dockerfile on
      Glama's side — their checks only need the server to start and answer
      introspection
    payload_ready: integrations/mcp/Dockerfile (proven in-container 2026-07-09 ·
      ubuntu-24.04 glibc-2.39 · initialize + tools/list answered) — unblocks
      awesome-mcp-servers PR 9743 (missing-glama gate) in the same move
  - surface: MCP Registry (registry.modelcontextprotocol.io)
    blocker: a REAL package lane — either cargo (crates.io `nika` is owned,
      stale 0.47.1 → publish 0.98.x from the engine release train;
      registryType cargo is first-class per the current schema) or the npm
      revival; plus mcp-publisher login github (org grant) — interactive auth
    payload_ready: integrations/mcp/server.json (bump $schema to the current
      2025-12-11 rev at publish — migration is no-changes per their changelog)
  - surface: hermesatlas.com
    blocker: web form (« suggest a repo ») — human submission
    payload_ready: description-bank hermes/agent-catalogs lead
