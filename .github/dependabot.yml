# Dependabot · supply-chain freshness for this repo's own CI.
#
# Only THIS repo's own .github/workflows/ is in scope. The engine mirror
# under .agents/plugins/nika/** is a byte-pinned projection of the engine
# and carries no workflows, so Dependabot never touches it.
#
# github-actions bumps are GROUPED into ONE weekly PR. Lesson proven on
# nika-spec 2026-07-19 (PR #135): a multi-step action pair such as
# github/codeql-action's `init` + `analyze`, if bumped in SEPARATE PRs,
# desyncs mid-merge and the scan breaks (init and analyze must ride the
# same version). One grouped weekly PR keeps the pair, and every other
# action, moving together.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
