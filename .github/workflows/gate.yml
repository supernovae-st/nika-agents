name: gate

# The marketplace repo's own CI: every manifest parses, the three plugin
# versions agree, the mirror contract holds (mirror.json is the SSOT — pins
# fail hard, upstream movement warns), kit-native skills only teach shipped
# commands, and the teaching surfaces carry no stale counts. No
# user-controlled input reaches the shell (the only expression used is
# github.event_name, a GitHub-controlled enum).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # The mirror drifts BETWEEN pushes (the engine side moves without this
    # repo knowing) — a daily tick makes upstream drift visible within 24h
    # instead of at the next unrelated PR. 06:23 UTC · off-peak.
    - cron: '23 6 * * *'

permissions:
  contents: read

jobs:
  # The Glama payload must stay live: build the oracle image from the release
  # artifacts and prove it answers MCP introspection in-container — the exact
  # check directory listers run. A release that breaks the Dockerfile (new
  # glibc floor, renamed asset) goes RED here, not at submission time.
  docker-oracle:
    name: dockerfile builds · oracle answers in-container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build the oracle image
        run: docker build -t nika-mcp-gate integrations/mcp/
      - name: The bundled server answers initialize + tools/list
        run: |
          set -euo pipefail
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"gate","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | docker run -i --rm nika-mcp-gate > /tmp/mcp.out
          python3 - << 'EOF'
          import json
          tools = None
          for line in open("/tmp/mcp.out"):
              line = line.strip()
              if not line:
                  continue
              msg = json.loads(line)
              if msg.get("id") == 2 and "result" in msg:
                  tools = [t["name"] for t in msg["result"]["tools"]]
          assert tools, "no tools/list reply from the containerized oracle"
          print(f"in-container oracle serves {len(tools)} tools: {' '.join(sorted(tools))}")
          EOF

  gate:
    name: manifests · versions · mirror · binary-truth
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Every JSON manifest parses
        run: |
          set -euo pipefail
          find . -name '*.json' -not -path './.git/*' -print0 \
            | xargs -0 -I{} python3 -m json.tool {} /dev/null
          echo "all manifests parse"
      - name: The vocabulary law holds (description-bank discipline)
        run: python3 scripts/check-vocab.py
      - name: The listings registry parses
        run: |
          python3 - << 'EOF'
          import yaml
          d = yaml.safe_load(open("listings.yaml"))
          assert d.get("listings_version") == 1 and d.get("entries"), \
              "listings.yaml: expected listings_version 1 + non-empty entries"
          print(f"listings.yaml parses · {len(d['entries'])} entries · "
                f"{len(d.get('queued_operator', []))} queued")
          EOF
      - name: The plugin versions agree
        run: |
          python3 - << 'EOF'
          import json, pathlib, sys
          versions = {}
          for p in (".agents/plugins/nika/.claude-plugin/plugin.json",
                    ".agents/plugins/nika/.codex-plugin/plugin.json",
                    ".agents/plugins/nika/.cursor-plugin/plugin.json"):
              versions[p] = json.loads(pathlib.Path(p).read_text())["version"]
          for p in (".claude-plugin/marketplace.json",
                    ".cursor-plugin/marketplace.json",
                    ".agents/plugins/marketplace.json"):
              m = json.loads(pathlib.Path(p).read_text())
              for entry in m.get("plugins", []):
                  if "version" in entry:
                      versions[f"{p}#{entry.get('name', '?')}"] = entry["version"]
          uniq = set(versions.values())
          for k, v in versions.items():
              print(f"{v}  {k}")
          if len(uniq) > 1:
              sys.exit("plugin versions diverge — bump them together")
          print(f"one version everywhere: {uniq.pop()}")
          EOF
      # mirror.json is the drift CONTRACT (two classes):
      #   engine-mirror — byte-identical projection of supernovae-st/nika,
      #     pinned by sha256 at the engine SHA it was proven against.
      #     A pin mismatch = the KIT is corrupted → fail HARD everywhere.
      #   kit-native — owned here, proven against the released binary below.
      # This replaces the old hardcoded 3-file list (which was blind to
      # .mcp.json and to every future pack).
      - name: Every mirrored file matches its pin (mirror.json)
        run: |
          python3 - << 'EOF'
          import hashlib, json, pathlib, sys
          manifest = json.loads(pathlib.Path("mirror.json").read_text())
          bad = []
          for e in manifest["entries"]:
              p = pathlib.Path(e["path"])
              if not p.is_file():
                  bad.append(f"missing: {e['path']}")
                  continue
              if e["class"] != "engine-mirror":
                  continue
              got = hashlib.sha256(p.read_bytes()).hexdigest()
              if got != e["sha256"]:
                  bad.append(f"pin mismatch: {e['path']}\n"
                             f"  pinned {e['sha256']}\n  got    {got}")
          if bad:
              print("::error::mirror corrupted vs mirror.json pins")
              print("\n".join(bad))
              sys.exit(1)
          n = sum(1 for e in manifest["entries"] if e["class"] == "engine-mirror")
          print(f"✓ {n} engine-mirror pins hold "
                f"(synced at engine {manifest['synced_at_engine_sha'][:9]})")
          EOF
      # Upstream MOVING is a different signal from the kit being corrupted:
      # on the daily cron it fails loud (re-sync is due — bump the pins from
      # engine main); on push/PR it only warns, so an author's unrelated PR
      # never inherits a red gate from engine motion.
      - name: Upstream drift (engine main moved past the pins?)
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/supernovae-st/nika/main"
          drifted=0
          # path=local file · source (optional)=where it lives in the ENGINE
          # tree when the two differ (e.g. the root marketplace logo pinned
          # to the kit's) — the fetch follows the SOURCE, the diff reads the
          # local path.
          while IFS=$'\t' read -r f src; do
            curl -fsSL "${base}/${src}" -o /tmp/upstream
            if ! diff -q /tmp/upstream "$f" > /dev/null; then
              drifted=1
              echo "::warning::${f} differs from engine main (${src}) — upstream moved, re-sync + re-pin due"
              diff -u "$f" /tmp/upstream | head -40 || true
            fi
          done < <(python3 -c 'import json; [print(e["path"], e.get("source", e["path"]), sep="\t") for e in json.load(open("mirror.json"))["entries"] if e["class"]=="engine-mirror"]')
          if [ "$drifted" = "1" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "::error::engine main moved past the mirror pins — run the re-sync"
            exit 1
          fi
          [ "$drifted" = "0" ] && echo "mirror current with engine main" || true
      # Binary truth: fetch the LATEST release (checksum-verified against the
      # published SHA256SUMS — an unverified curl|tar into CI is the exact
      # supply-chain hole the kit exists to close), then assert the teaching
      # surfaces against the wire, not against memory:
      #   · README's advertised nika_* tools == `nika mcp` tools/list
      #   · kit-native skills only teach subcommands the release ships
      - name: The teaching surfaces match the shipped engine
        run: |
          set -euo pipefail
          tag=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            https://github.com/supernovae-st/nika/releases/latest | sed 's|.*/tag/||')
          ver=${tag#v}
          echo "checking marketplace docs against nika ${tag}"
          dl="https://github.com/supernovae-st/nika/releases/download/${tag}"
          asset="nika-linux-x64-${ver}.tar.gz"
          curl -fsSL "${dl}/${asset}" -o "${asset}"
          curl -fsSL "${dl}/SHA256SUMS" -o SHA256SUMS
          grep " ${asset}\$" SHA256SUMS | sha256sum -c -
          tar xzf "${asset}"
          NIKA_BIN=./nika python3 scripts/check-mcp-tools.py
          NIKA_BIN=./nika python3 scripts/check-skill-commands.py
