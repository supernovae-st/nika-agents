name: gate

# The marketplace repo's own CI: every manifest parses, the three plugin
# versions agree, the mirrored paths resolve, and the teaching surfaces
# carry no stale counts. No user-controlled input reaches the shell.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # The mirror drifts BETWEEN pushes (the engine side moves without this
    # repo knowing) — a daily tick makes byte-parity drift visible within
    # 24h instead of at the next unrelated PR. 06:23 UTC · off-peak.
    - cron: '23 6 * * *'

permissions:
  contents: read

jobs:
  gate:
    name: manifests · versions · paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Every JSON manifest parses
        run: |
          set -euo pipefail
          find . -name '*.json' -not -path './.git/*' -print0 \
            | xargs -0 -I{} python3 -m json.tool {} /dev/null
          echo "all manifests parse"
      - name: The plugin versions agree
        run: |
          python3 - << 'EOF'
          import json, pathlib, sys
          versions = {}
          for p in (".agents/plugins/nika/.claude-plugin/plugin.json",
                    ".agents/plugins/nika/.codex-plugin/plugin.json"):
              versions[p] = json.loads(pathlib.Path(p).read_text())["version"]
          for p in (".claude-plugin/marketplace.json",
                    ".agents/plugins/marketplace.json"):
              m = json.loads(pathlib.Path(p).read_text())
              for entry in m.get("plugins", []):
                  if "version" in entry:
                      versions[f"{p}#{entry.get('name', '?')}"] = entry["version"]
          uniq = set(versions.values())
          for k, v in versions.items():
              print(f"{v}  {k}")
          if len(uniq) > 1:
              sys.exit("plugin versions diverge — bump them together")
          print(f"one version everywhere: {uniq.pop()}")
          EOF
      - name: The mirrored files exist
        run: |
          set -euo pipefail
          for f in README.md \
                   .agents/plugins/nika/skills/nika-authoring/SKILL.md \
                   .agents/plugins/nika/.mcp.json \
                   .agents/plugins/nika/.claude-plugin/plugin.json \
                   .agents/plugins/nika/.codex-plugin/plugin.json; do
            [ -f "$f" ] || { echo "missing: $f"; exit 1; }
          done
          echo "surface complete"
      # « Mirrored verbatim from the engine » was a README claim with no
      # gate — and it drifted BOTH directions (the 2026-07-08 audit: the
      # skill here lagged engine steps 6-7; the engine's plugin.json
      # lagged this repo's 8-tool truth). Byte-diff the mirrored files
      # against engine main so the claim is structural. Reads raw repo
      # files only — no user-controlled input reaches the shell.
      - name: The mirror is byte-identical to the engine (main)
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/supernovae-st/nika/main"
          for f in .agents/plugins/nika/skills/nika-authoring/SKILL.md \
                   .agents/plugins/nika/.claude-plugin/plugin.json \
                   .agents/plugins/nika/.codex-plugin/plugin.json; do
            curl -fsSL "${base}/${f}" -o /tmp/upstream
            diff -u /tmp/upstream "$f" || { echo "::error::${f} drifted from the engine mirror"; exit 1; }
          done
          echo "mirror byte-identical"
      # The README advertises the MCP oracle's tools by name; that list is
      # hand-written and drifts the day the engine adds or drops one. Fetch the
      # LATEST engine (not a pin) so a new tool turns this red and forces the
      # marketplace to follow — a live docs<->binary coherence gate.
      - name: The advertised MCP tools match the shipped engine
        run: |
          set -euo pipefail
          # Resolve the latest tag via the web redirect (github.com, not the
          # rate-limited api.github.com) → /releases/tag/vX.Y.Z.
          tag=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            https://github.com/supernovae-st/nika/releases/latest | sed 's|.*/tag/||')
          ver=${tag#v}
          echo "checking marketplace docs against nika ${tag}"
          curl -fsSL "https://github.com/supernovae-st/nika/releases/download/${tag}/nika-linux-x64-${ver}.tar.gz" | tar xz
          NIKA_BIN=./nika python3 scripts/check-mcp-tools.py
