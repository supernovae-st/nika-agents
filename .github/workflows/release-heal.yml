name: release-heal

# The mirror follows engine main without a hand-run resync (run by hand
# after every kit bump today): daily, re-sync every engine-mirror file
# and open ONE idempotent PR on drift — the manifests/pins gate judges,
# never a direct push. SECURITY: no github.event data in the shell.

on:
  schedule:
    - cron: '35 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: The mirror follows engine main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/resync-mirror.py
          git add -A
          if git diff --cached --quiet; then echo "mirror current — nothing to heal"; exit 0; fi
          git config user.name "nika-release[bot]"
          git config user.email "nika@supernovae.studio"
          git checkout -B bot/mirror-resync
          git commit -m "sync(mirror): the mirror follows engine main (release-heal)"
          git push -f origin bot/mirror-resync
          gh pr create --head bot/mirror-resync \
            --title "sync(mirror): the mirror follows engine main" \
            --body "Automated resync (release-heal). The manifests/pins gate judges; merge on green." \
            2>/dev/null || echo "PR already open — refreshed"
